<!DOCTYPE html>
<html>
<head>
    <title>Crop Recommendation System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>Smart Crop Recommendation System</h1>

    <form action="/predict" method="POST">
        <input type="number" step="any" name="nitrogen" placeholder="Nitrogen value" required>
        <input type="number" step="any" name="phosphorus" placeholder="Phosphorus value" required>
        <input type="number" step="any" name="potassium" placeholder="Potassium value" required>
        <input type="number" step="any" name="temperature" placeholder="Temperature" required>
        <input type="number" step="any" name="humidity" placeholder="Humidity" required>
        <input type="number" step="any" name="ph" placeholder="pH value" required>
        <input type="number" step="any" name="rainfall" placeholder="Rainfall" required>

        <button type="submit">Recommend Crop</button>
    </form>

    {% if result %}
    <div class="result">
        Recommended Crop: <b>{{ result }}</b>
    </div>
    {% endif %}
</div>

</body>
</html>
